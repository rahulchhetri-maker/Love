<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me? | A Premium Interactive Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-color: #4a0e17;
            --primary-color: #ff4d6d;
            --primary-hover: #ff0a54;
            --secondary-color: #ffffff;
            --secondary-text: #ff4d6d;
            --shadow: 0 16px 32px 0 rgba(255, 77, 109, 0.15);
            --accent-glow: 0 0 20px rgba(255, 77, 109, 0.4);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #241435 100%);
            --glass-bg: rgba(25, 18, 38, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #fff0f3;
            --primary-color: #ff4d6d;
            --primary-hover: #ff758f;
            --secondary-color: rgba(255, 255, 255, 0.1);
            --secondary-text: #fff0f3;
            --shadow: 0 16px 32px 0 rgba(0, 0, 0, 0.5);
            --accent-glow: 0 0 25px rgba(255, 77, 109, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            overflow-x: hidden;
            color: var(--text-color);
            transition: background 0.8s ease, color 0.5s ease;
            position: relative;
            padding: 24px 0;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        #cursorCanvas { z-index: 9999; }

        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-gradient);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .loader-heart {
            width: 80px;
            height: 80px;
            fill: var(--primary-color);
            animation: pulse 1.2s infinite ease-in-out;
            filter: drop-shadow(var(--accent-glow));
        }

        .loader-text {
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .top-controls {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            backdrop-filter: blur(12px);
            transition: transform 0.3s, background 0.3s;
            box-shadow: var(--shadow);
        }

        .control-btn:hover {
            transform: scale(1.1);
            background: var(--primary-color);
            color: white;
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .wrapper {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 420px;
            min-height: auto;
            perspective: 1000px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            min-height: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 18px;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.5s, border-color 0.4s;
            position: relative;
        }

        .panel {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s forwards ease;
        }

        .panel.active { display: flex; }

        .icon-banner {
            width: 90px;
            height: 90px;
            margin-bottom: 24px;
            fill: var(--primary-color);
            filter: drop-shadow(0 8px 16px rgba(255,77,109,0.3));
            animation: float 4s infinite ease-in-out;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.85;
            margin-bottom: 30px;
            font-weight: 400;
            padding: 0 10px;
        }

        .quote-ticker {
            font-family: 'Caveat', cursive;
            font-size: 22px;
            color: var(--primary-color);
            margin-bottom: 25px;
            min-height: 35px;
            font-weight: 700;
            transition: opacity 0.4s ease;
        }

        .love-meter-box {
            width: 100%;
            background: rgba(0,0,0,0.05);
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }
        [data-theme="dark"] .love-meter-box { background: rgba(255,255,255,0.05); }

        .love-meter-bar {
            height: 14px;
            width: 15%;
            background: linear-gradient(90deg, #ff758f, #ff0a54);
            border-radius: 20px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--accent-glow);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            width: 100%;
            justify-content: center;
            align-items: center;
            min-height: auto;
            position: static;
            overflow: visible;
            padding: 8px 0;
        }

        .btn {
            padding: 16px 34px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .btn-yes {
            background: var(--primary-color);
            color: white;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, box-shadow 0.3s;
            transform-origin: center;
        }

        .btn-yes:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
            box-shadow: var(--accent-glow);
        }

        .btn-no {
            background: var(--secondary-color);
            color: var(--secondary-text);
            border: 1px solid var(--glass-border);
            position: relative;
            z-index: 999;
            transition: transform 0.2s ease, opacity 0.3s ease;
        }

        .scold-msg {
            position: absolute;
            bottom: -20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-color);
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }

        .success-title {
            font-family: 'Caveat', cursive;
            font-size: 52px;
            color: var(--primary-color);
            margin-top: 10px;
        }

        .typewriter-text {
            font-size: 16px;
            margin: 20px 0;
            min-height: 48px;
            line-height: 1.6;
            font-weight: 500;
            max-width: 340px;
        }

        .love-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            margin-top: 15px;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        @media (max-width: 768px) {
            .wrapper { width: 95%; max-width: 420px; min-height: 560px; }
            .card { padding: 34px 22px; }
            h1 { font-size: 28px; }
            .icon-banner { width: 80px; height: 80px; }
            .quote-ticker { font-size: 20px; }
            .love-meter-bar { height: 13px; }
            .love-meter-box { margin-bottom: 24px; }
            .btn-group { min-height: 240px; gap: 16px; }
            .btn { padding: 14px 30px; font-size: 15px; }
            .scold-msg { font-size: 12px; }
        }

        @media (max-width: 480px) {
            .wrapper { width: 96%; max-width: 100%; min-height: auto; }
            .card { padding: 26px 18px; }
            h1 { font-size: 24px; }
            .subtitle { font-size: 14px; }
            .icon-banner { width: 70px; height: 70px; }
            .quote-ticker { font-size: 18px; }
            .love-meter-bar { height: 12px; }
            .love-meter-box { margin-bottom: 20px; }
            .btn-group { min-height: 220px; gap: 12px; }
            .btn { padding: 12px 24px; font-size: 14px; }
            .success-title { font-size: 42px; }
            .typewriter-text { max-width: 100%; }
            .control-btn { padding: 10px; }
            .loader-heart { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <canvas id="ambientCanvas"></canvas>
    <canvas id="confettiCanvas"></canvas>
    <canvas id="cursorCanvas"></canvas>

    <div id="preloader">
        <svg class="loader-heart" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <div class="loader-text">Loading Romance...</div>
    </div>

    <div class="top-controls">
        <button class="control-btn" id="muteBtn" aria-label="Toggle Audio">
            <svg id="muteIcon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
        </button>
        <button class="control-btn" id="themeBtn" aria-label="Toggle Theme">
            <svg viewBox="0 0 24 24">
                <path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/>
            </svg>
        </button>
    </div>

    <div class="wrapper">
        <div class="card" id="mainCard">
            
            <div class="panel active" id="proposalPanel">
                <svg class="icon-banner" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>

                <h1 id="proposalTitle">Do You Love Me?</h1>
                <p class="subtitle" id="proposalSubtitle">Take a deep breath and listen to your heart before choosing.</p>
                
                <div class="quote-ticker" id="quoteTicker">Every heartbeat pulls me closer to you.</div>

                <div class="love-meter-box">
                    <div class="love-meter-bar" id="loveMeter"></div>
                </div>

                <div class="btn-group" id="btnGroup">
                    <button class="btn btn-yes" id="yesBtn">
                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span>Yes</span>
                    </button>
                    <button class="btn btn-no" id="noBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                        <span>No</span>
                    </button>
                    <div class="scold-msg" id="scoldMsg">Hey! That button is off limits!</div>
                </div>
            </div>

            <div class="panel" id="successPanel">
                <svg class="icon-banner" style="animation: pulse 2s infinite ease-in-out;" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>

                <h2 class="success-title">I Knew It!</h2>
                <div class="typewriter-text" id="typewriter"></div>

                <div class="love-card">
                    <div style="font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; margin-bottom: 6px;">Partnership Status</div>
                    <div style="font-weight: 700; font-size: 18px; color: var(--primary-color);">Locked Forever ❤️</div>
                    <div style="font-size: 12px; opacity: 0.6; margin-top: 10px;" id="timestamp"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const App = {
            config: {
                noClickAttempts: 0,
                isMuted: false,
                currentTheme: 'dark',
                quotes: [
                    "Every heartbeat pulls me closer to you.",
                    "In your smile, I see something beautiful.",
                    "They say love is a journey, start it with me?",
                    "My universe sparkles brightest when you're near."
                ],
                scoldings: [
                    "Nice try! Give it another go. 😉",
                    "Error 404: Option Unavailable.",
                    "Are you sure? Think about it! 🤔",
                    "My heart says you're clicking the wrong side.",
                    "In this universe, 'No' does not exist!",
                    "Whoops, missed it again! 🏃‍♂️💨",
                    "Clicking this is statistically impossible now.",
                    "Give up! Just say Yes! ❤️",
                    "Still trying? Impressive stamina! 🔥",
                    "You cannot escape fate!",
                    "Look at how big the YES button is getting...",
                    "Are we going to keep doing this all day? 😂"
                ],
                successText: "You have selected the correct path. From this moment on, your happiness is synced directly with mine. Forever and always. ✨"
            },

            init() {
                this.cacheElements();
                this.bindEvents();
                this.initCanvases();
                this.runQuotesEngine();
                
                setTimeout(() => {
                    const preloader = document.getElementById('preloader');
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 600);
                }, 1400);
            },

            cacheElements() {
                this.dom = {
                    body: document.body,
                    themeBtn: document.getElementById('themeBtn'),
                    muteBtn: document.getElementById('muteBtn'),
                    muteIcon: document.getElementById('muteIcon'),
                    noBtn: document.getElementById('noBtn'),
                    yesBtn: document.getElementById('yesBtn'),
                    btnGroup: document.getElementById('btnGroup'),
                    scoldMsg: document.getElementById('scoldMsg'),
                    loveMeter: document.getElementById('loveMeter'),
                    quoteTicker: document.getElementById('quoteTicker'),
                    proposalPanel: document.getElementById('proposalPanel'),
                    successPanel: document.getElementById('successPanel'),
                    typewriter: document.getElementById('typewriter'),
                    timestamp: document.getElementById('timestamp'),
                    mainCard: document.getElementById('mainCard')
                };
            },

            bindEvents() {
                this.dom.themeBtn.addEventListener('click', () => this.toggleTheme());
                this.dom.muteBtn.addEventListener('click', () => this.toggleMute());

                const dodgeNoButton = (e) => {
                    e.preventDefault();
                    this.handleNoEvasion();
                };
                
                this.dom.noBtn.addEventListener('mouseenter', dodgeNoButton);
                this.dom.noBtn.addEventListener('touchstart', dodgeNoButton, { passive: false });
                this.dom.noBtn.addEventListener('click', (e) => e.preventDefault());
                this.dom.yesBtn.addEventListener('click', () => this.triggerSuccessFlow());
                window.addEventListener('resize', () => this.resizeCanvases());
            },

            audioEngine(freq, type, duration) {
                if (this.config.isMuted) return;
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch(e) { console.log("Audio API issue."); }
            },

            toggleMute() {
                this.config.isMuted = !this.config.isMuted;
                if (this.config.isMuted) {
                    this.dom.muteIcon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
                } else {
                    this.dom.muteIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
                    this.audioEngine(523.25, 'sine', 0.1);
                }
            },

            toggleTheme() {
                this.config.currentTheme = this.config.currentTheme === 'dark' ? 'light' : 'dark';
                this.dom.body.setAttribute('data-theme', this.config.currentTheme);
                this.audioEngine(this.config.currentTheme === 'dark' ? 220 : 440, 'sine', 0.15);
            },

            runQuotesEngine() {
                let index = 0;
                setInterval(() => {
                    if(this.dom.proposalPanel.classList.contains('active')) {
                        index = (index + 1) % this.config.quotes.length;
                        this.dom.quoteTicker.style.opacity = 0;
                        setTimeout(() => {
                            this.dom.quoteTicker.textContent = this.config.quotes[index];
                            this.dom.quoteTicker.style.opacity = 1;
                        }, 400);
                    }
                }, 5000);
            },

            handleNoEvasion() {
                this.config.noClickAttempts++;

                const MAX_HIDE_ATTEMPTS = 20;

                if (this.config.noClickAttempts >= MAX_HIDE_ATTEMPTS) {
                    this.dom.noBtn.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                    this.dom.noBtn.style.opacity = '0';
                    this.dom.noBtn.style.transform = 'scale(0) translateY(-20px)';
                    this.dom.noBtn.style.pointerEvents = 'none';
                    setTimeout(() => this.dom.noBtn.remove(), 400);
                    this.dom.yesBtn.style.transform = 'scale(1.4)';
                    this.dom.loveMeter.style.width = '100%';
                    this.dom.scoldMsg.textContent = 'Resistance is impossible. Only YES remains.';
                    this.audioEngine(880, 'sawtooth', 0.4);
                    return;
                }

                this.audioEngine(293.66 + (this.config.noClickAttempts * 25), 'triangle', 0.12);

                if (this.dom.noBtn.style.position !== 'absolute') {
                    this.dom.noBtn.style.position = 'absolute';
                }

                const noScale = Math.max(1 - (this.config.noClickAttempts * 0.03), 0.7);
                this.dom.noBtn.style.transform = `scale(${noScale})`;
                this.dom.noBtn.style.opacity = '1';

                const yesScale = 1 + (this.config.noClickAttempts * 0.055);
                this.dom.yesBtn.style.transform = `scale(${Math.min(yesScale, 1.85)})`;

                const progressionWidth = Math.min(15 + (this.config.noClickAttempts * 6.5), 98);
                this.dom.loveMeter.style.width = `${progressionWidth}%`;

                const scoldIndex = Math.min(this.config.noClickAttempts - 1, this.config.scoldings.length - 1);
                this.dom.scoldMsg.textContent = this.config.scoldings[scoldIndex];
                this.dom.scoldMsg.style.opacity = 1;
                setTimeout(() => {
                    this.dom.scoldMsg.style.opacity = 0;
                }, 2000);

                const cardRect = this.dom.mainCard.getBoundingClientRect();
                const btnWidth = this.dom.noBtn.offsetWidth;
                const btnHeight = this.dom.noBtn.offsetHeight;

                const padding = 16;
                const minX = padding;
                const maxX = Math.max(cardRect.width - btnWidth - padding, minX);
                const minY = padding;
                const maxY = Math.max(cardRect.height - btnHeight - padding, minY);

                const yesRect = this.dom.yesBtn.getBoundingClientRect();
                const cardLeft = cardRect.left;
                const cardTop = cardRect.top;

                let targetX = minX;
                let targetY = minY;
                let validPosition = false;
                let attempts = 0;

                const isMobile = window.innerWidth < 768;
                const safetyMargin = isMobile ? 70 : 90;
                const minDistance = isMobile ? 90 : 160;
                const expandedYesRect = {
                    left: yesRect.left - safetyMargin,
                    top: yesRect.top - safetyMargin,
                    right: yesRect.right + safetyMargin,
                    bottom: yesRect.bottom + safetyMargin
                };

                while (!validPosition && attempts < 250) {
                    attempts++;
                    targetX = Math.random() * (maxX - minX) + minX;
                    targetY = Math.random() * (maxY - minY) + minY;

                    const noRect = {
                        left: cardLeft + targetX,
                        top: cardTop + targetY,
                        right: cardLeft + targetX + btnWidth,
                        bottom: cardTop + targetY + btnHeight
                    };

                    const overlap =
                        noRect.left < expandedYesRect.right &&
                        noRect.right > expandedYesRect.left &&
                        noRect.top < expandedYesRect.bottom &&
                        noRect.bottom > expandedYesRect.top;

                    const yesCenterX = yesRect.left + yesRect.width / 2;
                    const yesCenterY = yesRect.top + yesRect.height / 2;
                    const noCenterX = noRect.left + btnWidth / 2;
                    const noCenterY = noRect.top + btnHeight / 2;
                    const distance = Math.hypot(noCenterX - yesCenterX, noCenterY - yesCenterY);

                    if (!overlap && distance > minDistance) {
                        validPosition = true;
                    }
                }

                if (!validPosition) {
                    const corners = [
                        { x: minX, y: minY },
                        { x: maxX, y: minY },
                        { x: minX, y: maxY },
                        { x: maxX, y: maxY }
                    ];

                    let bestCorner = corners[0];
                    let bestDistance = 0;

                    const yesCenterX = yesRect.left + yesRect.width / 2;
                    const yesCenterY = yesRect.top + yesRect.height / 2;
                    for (let corner of corners) {
                        const centerX = cardLeft + corner.x + btnWidth / 2;
                        const centerY = cardTop + corner.y + btnHeight / 2;
                        const dist = Math.hypot(centerX - yesCenterX, centerY - yesCenterY);
                        if (dist > bestDistance) {
                            bestDistance = dist;
                            bestCorner = corner;
                        }
                    }

                    targetX = bestCorner.x;
                    targetY = bestCorner.y;
                }

                this.dom.noBtn.style.transition = 'left 0.25s ease, top 0.25s ease, transform 0.2s ease, opacity 0.3s ease';
                this.dom.noBtn.style.left = `${targetX}px`;
                this.dom.noBtn.style.top = `${targetY}px`;

                const tintIntensity = Math.min(this.config.noClickAttempts * 12, 160);
                this.dom.mainCard.style.borderColor = `rgba(255, 77, 109, ${0.1 + tintIntensity / 180})`;
            },

            triggerSuccessFlow() {
                this.audioEngine(523.25, 'sine', 0.1);
                setTimeout(() => this.audioEngine(659.25, 'sine', 0.1), 100);
                setTimeout(() => this.audioEngine(783.99, 'sine', 0.15), 200);
                setTimeout(() => this.audioEngine(1046.50, 'sine', 0.3), 300);

                this.dom.proposalPanel.classList.remove('active');
                this.dom.successPanel.classList.add('active');

                ConfettiSystem.burst(85);
                ConfettiSystem.activeCelebration = true;

                let charIdx = 0;
                this.dom.typewriter.textContent = "";
                const typeExecutor = () => {
                    if(charIdx < this.config.successText.length) {
                        this.dom.typewriter.textContent += this.config.successText.charAt(charIdx);
                        charIdx++;
                        setTimeout(typeExecutor, 30);
                    }
                }
                setTimeout(typeExecutor, 400);

                const now = new Date();
                this.dom.timestamp.textContent = now.toLocaleDateString('en-US', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
            },

            initCanvases() {
                AmbientParticles.init();
                ConfettiSystem.init();
                CursorTrailSystem.init();
            },

            resizeCanvases() {
                AmbientParticles.resize();
                ConfettiSystem.resize();
                CursorTrailSystem.resize();
            }
        }

        const AmbientParticles = {
            init() {
                this.canvas = document.getElementById('ambientCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resize();
                for (let i = 0; i < 24; i++) this.particles.push(this.createParticle(true));
                this.animate();
            },
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            createParticle(randomY = false) {
                return {
                    x: Math.random() * this.canvas.width,
                    y: randomY ? Math.random() * this.canvas.height : this.canvas.height + 20,
                    size: Math.random() * 14 + 6,
                    speed: Math.random() * 0.8 + 0.4,
                    opacity: Math.random() * 0.3 + 0.1,
                    wobble: Math.random() * 2,
                    wobbleSpeed: Math.random() * 0.02 + 0.01
                };
            },
            drawHeart(ctx, x, y, size) {
                ctx.beginPath();
                ctx.moveTo(x, y + size / 4);
                ctx.quadraticCurveTo(x, y, x + size / 2, y);
                ctx.quadraticCurveTo(x + size, y, x + size, y + size / 3);
                ctx.quadraticCurveTo(x + size, y + size * 2 / 3, x + size / 2, y + size);
                ctx.quadraticCurveTo(x, y + size * 2 / 3, x, y + size / 4);
                ctx.closePath();
                ctx.fill();
            },
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const isDark = document.body.getAttribute('data-theme') === 'dark';
                this.ctx.fillStyle = isDark ? 'rgba(255, 77, 109, 1)' : 'rgba(255, 10, 84, 1)';

                this.particles.forEach((p, index) => {
                    p.y -= p.speed;
                    p.wobble += p.wobbleSpeed;
                    const renderX = p.x + Math.sin(p.wobble) * 15;
                    
                    this.ctx.globalAlpha = p.opacity;
                    this.drawHeart(this.ctx, renderX, p.y, p.size);

                    if (p.y < -20) this.particles[index] = this.createParticle(false);
                });

                this.ctx.globalAlpha = 1.0;
                requestAnimationFrame(() => this.animate());
            }
        };

        const ConfettiSystem = {
            init() {
                this.canvas = document.getElementById('confettiCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.elements = [];
                this.activeCelebration = false;
                this.colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#ffffff'];
                this.resize();
                this.animate();
            },
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            burst(count) {
                for (let i = 0; i < count; i++) {
                    this.elements.push({
                        x: window.innerWidth / 2,
                        y: window.innerHeight / 2 + 100,
                        angle: Math.random() * Math.PI * 2,
                        velocity: Math.random() * 12 + 5,
                        gravity: 0.25,
                        size: Math.random() * 8 + 4,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        opacity: 1,
                        rotation: Math.random() * Math.PI,
                        rotationSpeed: Math.random() * 0.2 - 0.1
                    });
                }
            },
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.activeCelebration && Math.random() < 0.12) {
                    this.elements.push({
                        x: Math.random() * this.canvas.width,
                        y: -10,
                        angle: Math.PI / 2 + (Math.random() * 0.4 - 0.2),
                        velocity: Math.random() * 3 + 2,
                        gravity: 0.1,
                        size: Math.random() * 7 + 4,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        opacity: 0.9,
                        rotation: Math.random() * Math.PI,
                        rotationSpeed: Math.random() * 0.05 - 0.025
                    });
                }

                this.elements.forEach((e, idx) => {
                    if (e.gravity === 0.25) { 
                        e.x += Math.cos(e.angle) * e.velocity;
                        e.y += Math.sin(e.angle) * e.velocity + e.gravity;
                        e.velocity *= 0.98;
                    } else { 
                        e.y += e.velocity;
                        e.x += Math.sin(e.y / 30) * 0.5;
                    }

                    e.rotation += e.rotationSpeed;
                    
                    this.ctx.save();
                    this.ctx.globalAlpha = e.opacity;
                    this.ctx.fillStyle = e.color;
                    this.ctx.translate(e.x, e.y);
                    this.ctx.rotate(e.rotation);
                    this.ctx.fillRect(-e.size/2, -e.size/2, e.size, e.size);
                    this.ctx.restore();

                    if(e.y > this.canvas.height || e.opacity <= 0) {
                        this.elements.splice(idx, 1);
                    }
                });

                this.ctx.globalAlpha = 1.0;
                requestAnimationFrame(() => this.animate());
            }
        };

        const CursorTrailSystem = {
            init() {
                this.canvas = document.getElementById('cursorCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.points = [];
                this.mouse = { x: -100, y: -100 };
                this.resize();
                this.bindCoords();
                this.animate();
            },
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            bindCoords() {
                const updatePos = (x, y) => { this.mouse.x = x; this.mouse.y = y; };
                window.addEventListener('mousemove', (e) => updatePos(e.clientX, e.clientY));
                window.addEventListener('touchmove', (e) => {
                    if(e.touches.length > 0) updatePos(e.touches[0].clientX, e.touches[0].clientY);
                });
            },
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.mouse.x > 0 && Math.random() < 0.35) {
                    this.points.push({
                        x: this.mouse.x,
                        y: this.mouse.y,
                        size: Math.random() * 6 + 4,
                        opacity: 1,
                        vx: Math.random() * 2 - 1,
                        vy: Math.random() * -2 - 0.5
                    });
                }

                this.ctx.fillStyle = '#ff4d6d';
                this.points.forEach((p, idx) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.opacity -= 0.025;

                    this.ctx.globalAlpha = Math.max(p.opacity, 0);
                    AmbientParticles.drawHeart(this.ctx, p.x, p.y, p.size);

                    if (p.opacity <= 0) this.points.splice(idx, 1);
                });

                this.ctx.globalAlpha = 1.0;
                requestAnimationFrame(() => this.animate());
            }
        }

        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
